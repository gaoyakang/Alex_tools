<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>批量图片下载工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        color: white;
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        margin-bottom: 10px;
      }

      .header p {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.1rem;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
      }

      .input-section h2 {
        color: #333;
        margin-bottom: 15px;
        font-size: 1.3rem;
      }

      .input-hint {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      textarea {
        width: 100%;
        min-height: 200px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 14px;
        font-family: "Consolas", "Monaco", monospace;
        resize: vertical;
        transition: border-color 0.3s;
      }

      textarea:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn-group {
        display: flex;
        gap: 12px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .btn-success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        color: white;
      }

      .btn-success:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(17, 153, 142, 0.4);
      }

      .status-section {
        margin-top: 25px;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 15px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        width: 0%;
        transition: width 0.3s ease;
      }

      .stats {
        display: flex;
        justify-content: space-between;
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 15px;
      }

      .log-container {
        max-height: 300px;
        overflow-y: auto;
        background: #1a1a2e;
        border-radius: 12px;
        padding: 15px;
      }

      .log-item {
        font-family: "Consolas", monospace;
        font-size: 13px;
        padding: 6px 0;
        border-bottom: 1px solid #2a2a3e;
      }

      .log-item:last-child {
        border-bottom: none;
      }

      .log-success {
        color: #38ef7d;
      }

      .log-error {
        color: #ff6b6b;
      }

      .log-info {
        color: #74b9ff;
      }

      .log-warn {
        color: #fdcb6e;
      }

      .preview-section {
        margin-top: 25px;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 15px;
      }

      .preview-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        background: #f5f5f5;
        aspect-ratio: 1;
      }

      .preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .preview-item .status {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: white;
      }

      .status-pending {
        background: #fdcb6e;
      }

      .status-success {
        background: #38ef7d;
      }

      .status-error {
        background: #ff6b6b;
      }

      .preview-item .filename {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: 11px;
        padding: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #999;
      }

      .options {
        display: flex;
        gap: 20px;
        margin-top: 15px;
        flex-wrap: wrap;
      }

      .option-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .option-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .option-item label {
        color: #555;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .filename-pattern {
        margin-top: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .filename-pattern label {
        color: #555;
        font-size: 0.95rem;
      }

      .filename-pattern input {
        padding: 8px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        width: 200px;
      }

      .filename-pattern input:focus {
        outline: none;
        border-color: #667eea;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card input-section">
        <textarea
          id="urlInput"
          placeholder='数组格式：["https://example.com/image1.jpg"]
链接(单行)：https://example.com/image1.jpg'
        ></textarea>

        <div class="options">
          <div class="option-item">
            <input type="checkbox" id="zipDownload" checked />
            <label for="zipDownload">打包成 ZIP 下载（推荐）</label>
          </div>
          <div class="option-item">
            <input type="checkbox" id="sequentialDownload" />
            <label for="sequentialDownload">顺序下载（避免同时下载过多）</label>
          </div>
        </div>

        <div class="filename-pattern">
          <label>文件名格式：</label>
          <input
            type="text"
            id="filenamePattern"
            value="image_{index}_{original}"
            placeholder="image_{index}_{original}"
          />
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="parseAndPreview()">
            <span>👁️</span> 解析并预览
          </button>
          <button class="btn btn-success" onclick="startDownload()">
            <span>⬇️</span> 开始下载
          </button>
          <button class="btn btn-secondary" onclick="clearAll()">
            <span>🗑️</span> 清空
          </button>
        </div>
      </div>

      <div class="card preview-section hidden" id="previewSection">
        <h2>🖼️ 图片预览</h2>
        <div class="preview-grid" id="previewGrid"></div>
      </div>

      <div class="card status-section hidden" id="statusSection">
        <h2>📊 下载进度</h2>
        <div class="progress-bar">
          <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="stats">
          <span id="progressText">准备就绪</span>
          <span id="countText">0 / 0</span>
        </div>
        <div class="log-container" id="logContainer"></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
      let imageList = [];
      let downloadStatus = [];

      function log(message, type = "info") {
        const container = document.getElementById("logContainer");
        const item = document.createElement("div");
        item.className = `log-item log-${type}`;
        const time = new Date().toLocaleTimeString();
        item.textContent = `[${time}] ${message}`;
        container.appendChild(item);
        container.scrollTop = container.scrollHeight;
      }

      function parseUrls(input) {
        input = input.trim();
        if (!input) return [];

        try {
          const parsed = JSON.parse(input);
          if (Array.isArray(parsed)) {
            return parsed.filter(
              (url) => typeof url === "string" && url.trim(),
            );
          }
        } catch (e) {
          // Not JSON, try line-by-line
        }

        return input
          .split(/[\n,]+/)
          .map((url) => url.trim())
          .filter(
            (url) =>
              url && (url.startsWith("http://") || url.startsWith("https://")),
          );
      }

      function getFilenameFromUrl(url, index, pattern) {
        try {
          const urlObj = new URL(url);
          let original = urlObj.pathname.split("/").pop() || "unknown";
          original = original.split("?")[0];
          if (!original || original === "unknown") {
            original = `image_${index}.jpg`;
          }

          if (pattern) {
            return pattern
              .replace("{index}", String(index + 1).padStart(3, "0"))
              .replace("{original}", original);
          }
          return `${String(index + 1).padStart(3, "0")}_${original}`;
        } catch (e) {
          return `image_${String(index + 1).padStart(3, "0")}.jpg`;
        }
      }

      function parseAndPreview() {
        const input = document.getElementById("urlInput").value;
        imageList = parseUrls(input);

        if (imageList.length === 0) {
          alert("未找到有效的图片链接，请检查输入格式");
          return;
        }

        log(`成功解析 ${imageList.length} 个图片链接`, "success");
        renderPreview();
      }

      function renderPreview() {
        const section = document.getElementById("previewSection");
        const grid = document.getElementById("previewGrid");

        section.classList.remove("hidden");
        grid.innerHTML = "";

        imageList.forEach((url, index) => {
          const item = document.createElement("div");
          item.className = "preview-item";
          item.innerHTML = `
                    <img src="${url}" alt="图片 ${index + 1}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div style="display: none; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 12px;">加载失败</div>
                    <div class="status status-pending" id="status-${index}">⏳</div>
                    <div class="filename">${getFilenameFromUrl(url, index)}</div>
                `;
          grid.appendChild(item);
        });
      }

      async function fetchImage(url) {
        try {
          const response = await fetch(url, {
            mode: "cors",
            cache: "no-cache",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const blob = await response.blob();
          return blob;
        } catch (error) {
          try {
            const response = await fetch(url, {
              mode: "no-cors",
              cache: "no-cache",
            });
            const blob = await response.blob();
            return blob;
          } catch (e) {
            throw error;
          }
        }
      }

      async function downloadSingle(url, filename) {
        try {
          const blob = await fetchImage(url);
          const blobUrl = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
          return { success: true };
        } catch (error) {
          try {
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank";
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            return { success: true, fallback: true };
          } catch (e) {
            return { success: false, error: error.message };
          }
        }
      }

      async function startDownload() {
        if (imageList.length === 0) {
          parseAndPreview();
          if (imageList.length === 0) return;
        }

        const useZip = document.getElementById("zipDownload").checked;
        const sequential =
          document.getElementById("sequentialDownload").checked;
        const pattern = document.getElementById("filenamePattern").value;

        const statusSection = document.getElementById("statusSection");
        statusSection.classList.remove("hidden");

        downloadStatus = new Array(imageList.length).fill("pending");
        let completed = 0;
        let failed = 0;

        const progressBar = document.getElementById("progressBar");
        const progressText = document.getElementById("progressText");
        const countText = document.getElementById("countText");

        function updateProgress() {
          const percent = ((completed + failed) / imageList.length) * 100;
          progressBar.style.width = `${percent}%`;
          countText.textContent = `${completed} 成功 / ${failed} 失败 / ${imageList.length} 总计`;
        }

        log(`开始下载 ${imageList.length} 张图片...`, "info");

        if (useZip) {
          const zip = new JSZip();
          const folder = zip.folder("images");

          if (sequential) {
            for (let i = 0; i < imageList.length; i++) {
              try {
                progressText.textContent = `正在下载: ${getFilenameFromUrl(imageList[i], i, pattern)}`;
                log(
                  `下载中 [${i + 1}/${imageList.length}]: ${imageList[i].substring(0, 60)}...`,
                  "info",
                );

                const response = await fetch(imageList[i], { mode: "cors" });
                if (response.ok) {
                  const blob = await response.blob();
                  const filename = getFilenameFromUrl(imageList[i], i, pattern);
                  folder.file(filename, blob);
                  downloadStatus[i] = "success";
                  completed++;
                  log(`✓ 已添加: ${filename}`, "success");
                  updateStatusIcon(i, "success");
                } else {
                  throw new Error(`HTTP ${response.status}`);
                }
              } catch (error) {
                downloadStatus[i] = "error";
                failed++;
                log(`✗ 失败 [${i + 1}]: ${error.message}`, "error");
                updateStatusIcon(i, "error");
              }
              updateProgress();
              await new Promise((r) => setTimeout(r, 300));
            }
          } else {
            const promises = imageList.map((url, i) => {
              return fetch(url, { mode: "cors" })
                .then((response) => {
                  if (response.ok) {
                    return response.blob().then((blob) => {
                      const filename = getFilenameFromUrl(url, i, pattern);
                      folder.file(filename, blob);
                      downloadStatus[i] = "success";
                      completed++;
                      log(`✓ 已添加: ${filename}`, "success");
                      updateStatusIcon(i, "success");
                    });
                  } else {
                    throw new Error(`HTTP ${response.status}`);
                  }
                })
                .catch((error) => {
                  downloadStatus[i] = "error";
                  failed++;
                  log(`✗ 失败 [${i + 1}]: ${error.message}`, "error");
                  updateStatusIcon(i, "error");
                })
                .finally(() => {
                  updateProgress();
                });
            });
            await Promise.all(promises);
          }

          if (completed > 0) {
            progressText.textContent = "正在生成 ZIP 文件...";
            log("正在打包 ZIP...", "info");

            const content = await zip.generateAsync(
              {
                type: "blob",
                compression: "DEFLATE",
                compressionOptions: { level: 6 },
              },
              (metadata) => {
                progressText.textContent = `打包进度: ${metadata.percent.toFixed(0)}%`;
              },
            );

            const zipUrl = URL.createObjectURL(content);
            const a = document.createElement("a");
            a.href = zipUrl;
            a.download = `images_${new Date().getTime()}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(zipUrl);

            log(`✓ ZIP 下载完成！包含 ${completed} 张图片`, "success");
            progressText.textContent = "下载完成";
          } else {
            log("没有成功下载任何图片", "error");
            progressText.textContent = "下载失败";
          }
        } else {
          if (sequential) {
            for (let i = 0; i < imageList.length; i++) {
              const filename = getFilenameFromUrl(imageList[i], i, pattern);
              progressText.textContent = `正在下载: ${filename}`;
              log(`下载中 [${i + 1}/${imageList.length}]: ${filename}`, "info");

              const result = await downloadSingle(imageList[i], filename);
              if (result.success) {
                completed++;
                log(
                  `✓ 已下载: ${filename}${result.fallback ? " (使用备用方法)" : ""}`,
                  "success",
                );
                updateStatusIcon(i, "success");
              } else {
                failed++;
                log(`✗ 失败: ${filename} - ${result.error}`, "error");
                updateStatusIcon(i, "error");
              }
              updateProgress();
              await new Promise((r) => setTimeout(r, 500));
            }
          } else {
            imageList.forEach((url, i) => {
              const filename = getFilenameFromUrl(url, i, pattern);
              setTimeout(() => {
                downloadSingle(url, filename).then((result) => {
                  if (result.success) {
                    completed++;
                    log(`✓ 已下载: ${filename}`, "success");
                    updateStatusIcon(i, "success");
                  } else {
                    failed++;
                    log(`✗ 失败: ${filename}`, "error");
                    updateStatusIcon(i, "error");
                  }
                  updateProgress();
                });
              }, i * 200);
            });
          }
          progressText.textContent = "下载完成";
        }
      }

      function updateStatusIcon(index, status) {
        const icon = document.getElementById(`status-${index}`);
        if (icon) {
          icon.className = `status status-${status}`;
          icon.textContent =
            status === "success" ? "✓" : status === "error" ? "✗" : "⏳";
        }
      }

      function clearAll() {
        document.getElementById("urlInput").value = "";
        document.getElementById("previewSection").classList.add("hidden");
        document.getElementById("statusSection").classList.add("hidden");
        document.getElementById("previewGrid").innerHTML = "";
        document.getElementById("logContainer").innerHTML = "";
        document.getElementById("progressBar").style.width = "0%";
        imageList = [];
        downloadStatus = [];
      }
    </script>
  </body>
</html>
